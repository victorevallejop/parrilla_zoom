<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clases disponibles</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --line: #dfe7ef;
      --text: #3f4f63;
      --muted: #748396;
      --title: #506176;

      --blue: #0b57d0;
      --blue-dark: #003c72;
      --green: #198754;
      --yellow: #b58100;
      --red: #c62828;

      --track: #e6ebf2;
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 14px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
    }

    .titulo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: var(--title);
      margin-bottom: 12px;
    }

    .titulo img {
      width: 22px;
      height: 22px;
      flex: 0 0 auto;
    }

    .subinfo {
      margin: -4px 0 12px 32px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .card {
      --accent: var(--blue-dark);
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 6px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 15px 11px 15px;
      margin-bottom: 11px;
      box-shadow: var(--shadow);
    }

    .card.recomendada {
      box-shadow: 0 3px 11px rgba(0,0,0,0.09);
    }

    .card-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
      margin-bottom: 9px;
    }

    .resource-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 700;
      color: #4f647a;
      line-height: 1.25;
      min-width: 0;
    }

    .resource-title img {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .resource-title span {
      word-break: break-word;
    }

    .badge-group {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      color: #ffffff;
      background: var(--accent);
      min-height: 26px;
    }

    .badge-soft {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      padding: 5px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      color: var(--accent);
      background: rgba(255,255,255,0.85);
      border: 1px solid rgba(0,0,0,0.12);
      min-height: 26px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(190px, 1fr));
      gap: 6px 16px;
      margin-bottom: 9px;
    }

    .meta-item {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      font-size: 13.5px;
      line-height: 1.3;
    }

    .meta-item .k {
      font-weight: 700;
      color: #33465b;
    }

    .meta-item .v {
      color: #4a5d72;
    }

    .progress-block {
      margin-top: 3px;
      margin-bottom: 9px;
    }

    .progress-line-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 5px;
      flex-wrap: wrap;
      font-size: 12.5px;
    }

    .progress-line-top .left {
      color: #3c5065;
      font-weight: 700;
    }

    .progress-line-top .right {
      color: var(--muted);
      font-weight: 700;
    }

    .yt-progress {
      position: relative;
      width: 100%;
      height: 9px;
      border-radius: 999px;
      background: var(--track);
      overflow: visible;
    }

    .yt-progress-fill {
      position: relative;
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      overflow: visible;
      min-width: 0;
      transition: width 0.35s linear, background-color 0.35s linear;
    }

    .yt-progress-fill::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.20) 0px,
        rgba(255,255,255,0.20) 7px,
        rgba(255,255,255,0.00) 7px,
        rgba(255,255,255,0.00) 14px
      );
      animation: stripesMove 1.2s linear infinite;
      pointer-events: none;
    }

    .yt-progress-dot {
      position: absolute;
      right: -6px;
      top: 50%;
      width: 14px;
      height: 14px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #ffffff;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.12);
    }

    @keyframes stripesMove {
      from { background-position: 0 0; }
      to { background-position: 24px 0; }
    }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 7px;
    }

    .zoom-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 15px;
      background: var(--blue-dark);
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13.5px;
      border: none;
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      min-width: 135px;
      transition: transform 0.12s ease, opacity 0.12s ease, background-color 0.12s ease, filter 0.12s ease;
    }

    .zoom-btn:hover {
      transform: scale(1.02);
    }

    .zoom-btn:disabled,
    .zoom-btn-disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(30%);
      background: #7a8795;
    }

    .zoom-btn:disabled:hover,
    .zoom-btn-disabled:hover {
      transform: none;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .empty, .error {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 22px;
      text-align: center;
      color: #53677d;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    @media (max-width: 900px) {
      .meta-grid {
        grid-template-columns: repeat(2, minmax(220px, 1fr));
      }
    }

    @media (max-width: 680px) {
      body {
        padding: 12px;
      }

      .card-head {
        grid-template-columns: 1fr;
      }

      .badge-group {
        justify-content: flex-start;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .bottom-row {
        flex-direction: column;
        align-items: stretch;
      }

      .small {
        text-align: left;
      }

      .zoom-btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="titulo">
      <img src="https://campusvirtual.preucvonline.cl/theme/image.php/edumy/page/1760185087/icon" alt="">
      <span id="tituloPrincipal">Clases disponibles</span>
    </div>

    <div class="subinfo" id="subinfo">
      Se muestran primero las clases con menor avance para orientar el ingreso a la clase donde se pierde menos contenido.
    </div>

    <div id="contenedor">
      <div class="empty">Buscando clases disponibles...</div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwAC8NnIBgdWBTLInGmvSzXIeiA9G2ZRRwUik-rCPgpMRDI2N6voxgK_jjqANbfEPb1/exec';

    const PAGE_ICON = 'https://campusvirtual.preucvonline.cl/theme/image.php/edumy/page/1760185087/icon';

    const params = new URLSearchParams(window.location.search);
    const asignatura = (params.get('asignatura') || '').trim().toUpperCase();
    const username = (params.get('username') || '').trim();
    const debugNow = (params.get('debug_now') || '').trim();

    let serverNowMs = null;
    let loadedAtMs = Date.now();
    let clasesGlobal = [];
    let loadingClassId = null;
    let renderIntervalId = null;
    let resizeTimer = null;

    const nombresAsignatura = {
      LEN: 'Comprensión Lectora',
      MAT: 'Matemáticas',
      HIS: 'Historia',
      BIO: 'Biología',
      FIS: 'Física',
      QUI: 'Química',
      MEL: 'Matemáticas Electivo'
    };

    document.getElementById('tituloPrincipal').textContent =
      'Clases disponibles de ' + (nombresAsignatura[asignatura] || asignatura || 'la asignatura');

    function nowMs() {
      if (!serverNowMs) return Date.now();
      return serverNowMs + (Date.now() - loadedAtMs);
    }

    function cargarClases() {
      if (!asignatura) {
        mostrarError('No se recibió el parámetro de asignatura.');
        return;
      }

      const callbackName = '__parrillaCallback_' + Date.now();

      window[callbackName] = function(data) {
        try {
          if (!data || data.estado !== 'OK') {
            mostrarError(data && data.mensaje ? data.mensaje : 'No fue posible cargar clases.');
            return;
          }

          serverNowMs = Number(data.server_now_ms);
          loadedAtMs = Date.now();
          clasesGlobal = data.clases || [];

          render();

          if (renderIntervalId) {
            clearInterval(renderIntervalId);
          }

          renderIntervalId = setInterval(render, 1000);

        } finally {
          delete window[callbackName];
        }
      };

      const script = document.createElement('script');

      let src = GAS_URL
        + '?action=list'
        + '&asignatura=' + encodeURIComponent(asignatura)
        + '&callback=' + encodeURIComponent(callbackName);

      if (debugNow) {
        src += '&debug_now=' + encodeURIComponent(debugNow);
      }

      script.src = src;

      script.onerror = function() {
        mostrarError('No se pudo conectar con el servicio de clases.');
      };

      document.body.appendChild(script);
    }

    function render() {
      const contenedor = document.getElementById('contenedor');
      const actual = nowMs();

      const visibles = clasesGlobal
        .filter(c => {
          return actual >= Number(c.visible_desde_ms) && actual <= Number(c.visible_hasta_ms);
        })
        .map(c => {
          const ui = calcularEstadoVisual(c, actual);
          return { ...c, _ui: ui };
        })
        .sort((a, b) => {
          if (a._ui.orden !== b._ui.orden) {
            return a._ui.orden - b._ui.orden;
          }
          return Number(a.inicio_ms) - Number(b.inicio_ms);
        });

      if (visibles.length === 0) {
        contenedor.innerHTML = `
          <div class="empty">
            <strong>No hay clases disponibles para ingresar en este momento.</strong>
            <br><br>
            Los enlaces se habilitan únicamente cuando una clase está próxima a iniciar o se encuentra en desarrollo.
          </div>
        `;

        programarEnvioAltura();
        return;
      }

      contenedor.innerHTML = visibles.map((c, index) => renderCard(c, index)).join('');
      programarEnvioAltura();
    }

    function renderCard(c, index) {
      const ui = c._ui;
      const isLoading = loadingClassId === c.class_id;
      const esRecomendada = index === 0 && ui.botonHabilitado && !ui.claseTerminada;

      return `
        <div class="card ${esRecomendada ? 'recomendada' : ''}" style="--accent:${ui.colorHex};">
          <div class="card-head">
            <div class="resource-title">
              <img src="${PAGE_ICON}" alt="">
              <span>Ingresa a la clase del curso ${escapeHtml(c.sigla_curso)}</span>
            </div>

            <div class="badge-group">
              ${esRecomendada ? '<span class="badge-soft">Sugerida</span>' : ''}
              <span class="badge">${ui.texto}</span>
            </div>
          </div>

          <div class="meta-grid">
            <div class="meta-item">
              <span class="k">Asignatura:</span>
              <span class="v">${escapeHtml(c.asignatura)}</span>
            </div>

            <div class="meta-item">
              <span class="k">Profesor/a:</span>
              <span class="v">${escapeHtml(c.profesor || 'No informado')}</span>
            </div>

            <div class="meta-item">
              <span class="k">Día:</span>
              <span class="v">${escapeHtml(c.dia)}</span>
            </div>

            <div class="meta-item">
              <span class="k">Horario:</span>
              <span class="v">${escapeHtml(c.hora_inicio)} a ${escapeHtml(c.hora_fin)}</span>
            </div>

            <div class="meta-item">
              <span class="k">${ui.claseTerminada ? 'Duración:' : 'Tiempo transcurrido:'}</span>
              <span class="v">${ui.transcurridoTexto}</span>
            </div>

            <div class="meta-item">
              <span class="k">${ui.claseTerminada ? 'Estado:' : 'Tiempo restante:'}</span>
              <span class="v">${ui.restanteTexto}</span>
            </div>
          </div>

          <div class="progress-block">
            <div class="progress-line-top">
              <div class="left">Avance de la clase</div>
              <div class="right">${ui.porcentaje}%</div>
            </div>

            <div class="yt-progress" aria-label="Avance de la clase">
              <div class="yt-progress-fill" style="width:${ui.porcentaje}%;">
                ${ui.porcentaje > 0 ? '<span class="yt-progress-dot"></span>' : ''}
              </div>
            </div>
          </div>

          <div class="bottom-row">
            <button
              class="zoom-btn ${ui.claseTerminada ? 'zoom-btn-disabled' : ''}"
              type="button"
              onclick="registrarYEntrar('${escapeJs(c.class_id)}', this)"
              ${(isLoading || !ui.botonHabilitado) ? 'disabled' : ''}>
              ${
                ui.claseTerminada
                  ? 'Clase terminada'
                  : (isLoading ? 'Registrando ingreso...' : 'Ingresar a Zoom')
              }
            </button>

            <div class="small">
              Usuario Moodle: ${escapeHtml(username || 'no recibido')}
            </div>
          </div>
        </div>
      `;
    }

    function registrarYEntrar(classId, boton) {
      if (!classId) {
        alert('No se recibió el identificador de clase.');
        return;
      }

      loadingClassId = classId;
      render();

      const zoomTab = window.open('', '_blank');

      if (!zoomTab) {
        alert('El navegador bloqueó la apertura de la pestaña de Zoom. Permite ventanas emergentes para este sitio.');
        loadingClassId = null;
        render();
        return;
      }

      zoomTab.document.write(`
        <!DOCTYPE html>
        <html lang="es">
        <head>
          <meta charset="UTF-8">
          <title>Preparando ingreso a Zoom</title>
        </head>
        <body style="font-family: Arial, sans-serif; text-align:center; padding:40px;">
          <h2>Preparando ingreso a Zoom...</h2>
          <p>Estamos registrando tu ingreso a la clase.</p>
          <p>Esta ventana se actualizará automáticamente.</p>
        </body>
        </html>
      `);

      const callbackName = '__trackCallback_' + Date.now();

      window[callbackName] = function(data) {
        try {
          if (!data || data.estado !== 'OK' || !data.zoom_url) {
            zoomTab.document.body.innerHTML = `
              <div style="font-family: Arial, sans-serif; text-align:center; padding:40px;">
                <h2>No fue posible ingresar a la clase</h2>
                <p>${escapeHtml(data && data.mensaje ? data.mensaje : 'No fue posible registrar el ingreso.')}</p>
              </div>
            `;

            loadingClassId = null;
            render();
            return;
          }

          zoomTab.location.href = data.zoom_url;

          loadingClassId = null;
          render();

        } finally {
          delete window[callbackName];
        }
      };

      const script = document.createElement('script');

      let src = GAS_URL
        + '?action=track'
        + '&asignatura=' + encodeURIComponent(asignatura)
        + '&username=' + encodeURIComponent(username)
        + '&class_id=' + encodeURIComponent(classId)
        + '&callback=' + encodeURIComponent(callbackName);

      if (debugNow) {
        src += '&debug_now=' + encodeURIComponent(debugNow);
      }

      script.src = src;

      script.onerror = function() {
        zoomTab.document.body.innerHTML = `
          <div style="font-family: Arial, sans-serif; text-align:center; padding:40px;">
            <h2>No fue posible registrar el ingreso</h2>
            <p>No se pudo conectar con el servicio de clases.</p>
          </div>
        `;

        loadingClassId = null;
        render();
      };

      document.body.appendChild(script);
    }

    function calcularEstadoVisual(c, actual) {
      const inicio = Number(c.inicio_ms);
      const fin = Number(c.fin_ms);
      const visibleHasta = Number(c.visible_hasta_ms);
      const total = fin - inicio;

      if (actual < inicio) {
        const faltaMs = inicio - actual;

        return {
          texto: 'Comienza pronto',
          colorHex: '#003c72',
          porcentaje: 0,
          transcurridoTexto: '0 s',
          restanteTexto: 'comienza en ' + formatDuration(faltaMs),
          claseTerminada: false,
          botonHabilitado: true,
          orden: 0
        };
      }

      if (actual >= fin) {
        const tiempoParaOcultarseMs = Math.max(0, visibleHasta - actual);

        return {
          texto: 'Clase terminada',
          colorHex: '#c62828',
          porcentaje: 100,
          transcurridoTexto: formatDuration(total),
          restanteTexto: tiempoParaOcultarseMs > 0
            ? 'se ocultará en ' + formatDuration(tiempoParaOcultarseMs)
            : 'se ocultará en breve',
          claseTerminada: true,
          botonHabilitado: false,
          orden: 999
        };
      }

      const transcurridoMs = Math.max(0, actual - inicio);
      const restanteMs = Math.max(0, fin - actual);
      const porcentajeExacto = Math.max(0, Math.min(100, (transcurridoMs / total) * 100));
      const porcentaje = Math.round(porcentajeExacto);

      return {
        texto: obtenerTextoEstado(porcentajeExacto, restanteMs),
        colorHex: colorProgresivo(porcentajeExacto),
        porcentaje,
        transcurridoTexto: formatDuration(transcurridoMs),
        restanteTexto: formatDuration(restanteMs),
        claseTerminada: false,
        botonHabilitado: true,
        orden: porcentajeExacto
      };
    }

    function obtenerTextoEstado(porcentaje, restanteMs) {
      if (restanteMs <= 10 * 60 * 1000 || porcentaje >= 70) {
        return 'Clase próxima a finalizar';
      }

      if (porcentaje <= 25) {
        return 'Clase recién iniciada';
      }

      return 'Clase en desarrollo';
    }

    function colorProgresivo(porcentaje) {
      const p = Math.max(0, Math.min(100, porcentaje));

      const verde = { r: 25, g: 135, b: 84 };
      const amarillo = { r: 181, g: 129, b: 0 };
      const rojo = { r: 198, g: 40, b: 40 };

      if (p <= 50) {
        return rgbToHex(interpolarColor(verde, amarillo, p / 50));
      }

      return rgbToHex(interpolarColor(amarillo, rojo, (p - 50) / 50));
    }

    function interpolarColor(a, b, t) {
      const k = Math.max(0, Math.min(1, t));

      return {
        r: Math.round(a.r + (b.r - a.r) * k),
        g: Math.round(a.g + (b.g - a.g) * k),
        b: Math.round(a.b + (b.b - a.b) * k)
      };
    }

    function rgbToHex(c) {
      return '#' + [c.r, c.g, c.b]
        .map(v => v.toString(16).padStart(2, '0'))
        .join('');
    }

    function formatDuration(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;

      if (h > 0) {
        return `${h} h ${m} min ${String(s).padStart(2, '0')} s`;
      }

      if (m > 0) {
        return `${m} min ${String(s).padStart(2, '0')} s`;
      }

      return `${s} s`;
    }

    function mostrarError(msg) {
      document.getElementById('contenedor').innerHTML = `
        <div class="error">
          <strong>No fue posible cargar la parrilla.</strong>
          <br><br>
          ${escapeHtml(msg)}
        </div>
      `;

      programarEnvioAltura();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeJs(text) {
      return String(text || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"')
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '\\r');
    }

    function calcularAlturaDocumento() {
      const wrap = document.querySelector('.wrap');

      const alturas = [
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight,
        document.documentElement.offsetHeight,
        document.body.getBoundingClientRect().height,
        document.documentElement.getBoundingClientRect().height
      ];

      if (wrap) {
        const rect = wrap.getBoundingClientRect();

        alturas.push(rect.bottom + 24);
        alturas.push(wrap.scrollHeight + 36);
        alturas.push(wrap.offsetHeight + 36);
      }

      return Math.ceil(Math.max.apply(null, alturas.filter(n => Number.isFinite(n))));
    }

    function enviarAlturaAlPadre() {
      const altura = calcularAlturaDocumento();

      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: 'parrilla_zoom_height',
          height: altura
        }, '*');
      }
    }

    function enviarAlturaVariasVeces() {
      enviarAlturaAlPadre();

      setTimeout(enviarAlturaAlPadre, 80);
      setTimeout(enviarAlturaAlPadre, 180);
      setTimeout(enviarAlturaAlPadre, 400);
      setTimeout(enviarAlturaAlPadre, 900);
    }

    function programarEnvioAltura() {
      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(function() {
        enviarAlturaVariasVeces();
      }, 80);
    }

    function activarObservadoresDeAltura() {
      const target = document.querySelector('.wrap') || document.body;

      if ('ResizeObserver' in window && target) {
        const resizeObserver = new ResizeObserver(function() {
          programarEnvioAltura();
        });

        resizeObserver.observe(target);
        resizeObserver.observe(document.body);
        resizeObserver.observe(document.documentElement);
      }

      if ('MutationObserver' in window && target) {
        const mutationObserver = new MutationObserver(function() {
          programarEnvioAltura();
        });

        mutationObserver.observe(target, {
          childList: true,
          subtree: true,
          attributes: true,
          characterData: true
        });
      }

      window.addEventListener('load', enviarAlturaVariasVeces);
      window.addEventListener('resize', enviarAlturaVariasVeces);
      window.addEventListener('orientationchange', function() {
        setTimeout(enviarAlturaVariasVeces, 250);
      });

      setInterval(enviarAlturaAlPadre, 2500);
    }

    activarObservadoresDeAltura();

    cargarClases();
  </script>
</body>
</html>
